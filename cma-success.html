<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Received | Axial Realty LLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#f8f5ef;color:#1b2540;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
    .check{width:64px;height:64px;background:#c9a96e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;}
    h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:#1b2540;margin-bottom:.75rem;}
    p{font-size:.9rem;color:#6b7280;max-width:400px;line-height:1.6;margin-bottom:2rem;}
    a{display:inline-block;background:#c9a96e;color:#fff;font-weight:700;font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;padding:.7rem 1.75rem;border-radius:9999px;text-decoration:none;}
    a:hover{background:#dfc28d;}
  
    @media (max-width: 960px) {
      .lang-btn { display: none !important; }
      .tenant-btn { font-size: .68rem !important; padding: .35rem .65rem !important; }
    }
  
    html, body { overflow-x: hidden; max-width: 100%; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="check">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1>Request Received</h1>
  <p>Thank you — David Tung will review your property and follow up within 1–2 business days. Call or text (469) 980-8298 if you need anything sooner.</p>
  <a href="/">Back to Home</a>

<!-- Cookie Notice -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:var(--navy-dark,#1b2540);color:rgba(255,255,255,.85);font-family:'Inter',sans-serif;font-size:.8rem;padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;box-shadow:0 -2px 16px rgba(0,0,0,.18);">
  <span>We use cookies to improve your experience. By using this site you agree to our <a href="cookie-policy.html" style="color:#c9a96e;text-decoration:underline;">Cookie Policy</a> and <a href="privacy-policy.html" style="color:#c9a96e;text-decoration:underline;">Privacy Policy</a>.</span>
  <div style="display:flex;gap:.6rem;flex-shrink:0;">
    <button onclick="acceptCookies()" style="background:#c9a96e;color:#fff;border:none;border-radius:6px;padding:.45rem 1.1rem;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.04em;">Accept</button>
    <button onclick="declineCookies()" style="background:transparent;color:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.2);border-radius:6px;padding:.45rem 1rem;font-size:.78rem;cursor:pointer;">Decline</button>
  </div>
</div>
<script>
(function(){
  try {
    if (!localStorage.getItem('axial_cookie_consent')) {
      var b = document.getElementById('cookie-banner');
      if (b) b.style.display = 'flex';
    }
  } catch(e) {}
})();
function acceptCookies() {
  try { localStorage.setItem('axial_cookie_consent','accepted'); } catch(e) {}
  var b = document.getElementById('cookie-banner'); if(b) b.style.display='none';
}
function declineCookies() {
  try { localStorage.setItem('axial_cookie_consent','declined'); } catch(e) {}
  var b = document.getElementById('cookie-banner'); if(b) b.style.display='none';
}
</script>
</body>
</html>
